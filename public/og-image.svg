<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#002C51"/>
  <rect x="0" y="0" width="8" height="630" fill="#FF8C00"/>
  <rect x="0" y="0" width="1200" height="8" fill="#FF8C00"/>

  <!-- Grid -->
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#FF8C00" stroke-width="0.4" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Logo -->
  <text x="80" y="110" font-family="Arial Black, Arial" font-weight="900" font-size="52" letter-spacing="6" fill="#ffffff">WERKRUF</text>
  <rect x="80" y="124" width="280" height="5" fill="#FF8C00"/>

  <!-- Main headline -->
  <text x="80" y="230" font-family="Arial Black, Arial" font-weight="900" font-size="72" fill="#ffffff">MEHR AUFTRÄGE.</text>
  <text x="80" y="318" font-family="Arial Black, Arial" font-weight="900" font-size="72" fill="#FF8C00">MEHR SICHTBARKEIT.</text>

  <!-- Subline -->
  <text x="80" y="390" font-family="Arial, sans-serif" font-size="28" fill="#7090A8">Google Business Profil optimieren — für Handwerksbetriebe.</text>

  <!-- Stats -->
  <rect x="80" y="450" width="220" height="110" rx="8" fill="#FFFFFF" fill-opacity="0.06" stroke="#FF8C00" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="190" y="500" font-family="Arial Black, Arial" font-weight="900" font-size="44" fill="#FF8C00" text-anchor="middle">3×</text>
  <text x="190" y="530" font-family="Arial, sans-serif" font-size="16" fill="#7090A8" text-anchor="middle">mehr Anfragen</text>
  <text x="190" y="550" font-family="Arial, sans-serif" font-size="14" fill="#7090A8" text-anchor="middle">bei optimiertem Profil</text>

  <rect x="320" y="450" width="220" height="110" rx="8" fill="#FFFFFF" fill-opacity="0.06" stroke="#FF8C00" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="430" y="500" font-family="Arial Black, Arial" font-weight="900" font-size="44" fill="#FF8C00" text-anchor="middle">30</text>
  <text x="430" y="530" font-family="Arial, sans-serif" font-size="16" fill="#7090A8" text-anchor="middle">Tage kostenlos</text>
  <text x="430" y="550" font-family="Arial, sans-serif" font-size="14" fill="#7090A8" text-anchor="middle">kein Risiko</text>

  <rect x="560" y="450" width="220" height="110" rx="8" fill="#FFFFFF" fill-opacity="0.06" stroke="#FF8C00" stroke-width="1.5" stroke-opacity="0.4"/>
  <text x="670" y="500" font-family="Arial Black, Arial" font-weight="900" font-size="44" fill="#FF8C00" text-anchor="middle">0€</text>
  <text x="670" y="530" font-family="Arial, sans-serif" font-size="16" fill="#7090A8" text-anchor="middle">für den Check</text>
  <text x="670" y="550" font-family="Arial, sans-serif" font-size="14" fill="#7090A8" text-anchor="middle">sofort starten</text>

  <!-- Right side — score mockup -->
  <rect x="860" y="80" width="300" height="480" rx="12" fill="#FFFFFF" fill-opacity="0.04" stroke="#FF8C00" stroke-width="1" stroke-opacity="0.3"/>
  <rect x="860" y="80" width="300" height="8" rx="4" fill="#FF8C00"/>

  <text x="1010" y="160" font-family="Arial, sans-serif" font-size="13" fill="#7090A8" text-anchor="middle" letter-spacing="2">SICHTBARKEITS-SCORE</text>
  <text x="1010" y="240" font-family="Arial Black, Arial" font-weight="900" font-size="90" fill="#D93025" text-anchor="middle">25</text>
  <text x="1010" y="275" font-family="Arial, sans-serif" font-size="14" fill="#D93025" text-anchor="middle">KRITISCH</text>

  <rect x="900" y="300" width="220" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.1"/>
  <rect x="900" y="300" width="55" height="6" rx="3" fill="#D93025"/>

  <text x="1010" y="360" font-family="Arial, sans-serif" font-size="13" fill="#7090A8" text-anchor="middle">Ø Bewertung</text>
  <text x="1010" y="395" font-family="Arial Black, Arial" font-weight="900" font-size="36" fill="#ffffff" text-anchor="middle">3.2 ★</text>

  <rect x="880" y="430" width="260" height="44" rx="6" fill="#FF8C00"/>
  <text x="1010" y="458" font-family="Arial Black, Arial" font-weight="900" font-size="14" fill="#ffffff" text-anchor="middle" letter-spacing="1">JETZT OPTIMIEREN →</text>

  <!-- URL -->
  <text x="1180" y="610" font-family="Arial, sans-serif" font-size="18" fill="#7090A8" text-anchor="end">werkruf.com</text>
